<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="A clean, modern weather app with live forecasts, location-based weather, and dynamic visuals." />
        <meta name="keywords" content="weather, forecast, weather app, temperature, humidity, live weather" />
        <meta name="theme-color" content="#4A90E2" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Weather App" />

        <title>Weather App</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        
         <script src="https://kit.fontawesome.com/1fa6c7df0c.js" crossorigin="anonymous"></script>
        

         <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <link rel="stylesheet" type="text/css" href="assets/stylesheets/style.css" />
        <link rel="manifest" href="manifest.json" /> 
        <script src="assets/scripts/script.js" defer></script>
    </head>
    <body>
        <video id="bg-video" aria-hidden="true" preload="auto" autoplay muted loop playsinline></video>
        
        <header id="header"></header>
        <main id="main">
            <div id="app-container">
                <div id="title-container"><h1>🌦️ Weather App</h1></div>
                
                <div id="search-container">
                    <input type="text" id="city" maxlength="256" placeholder="Enter city name" aria-label="City name" autocomplete="off" spellcheck="false" />
                    <button type="button" aria-label="Search weather">Search</button>
                </div>
                
                <div id="result-container" hidden></div>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
